// Firebase SDK (v9 compat)
let _db = null;
let _fbReady = false;
let _fbCallbacks = [];

function onFirebaseReady(cb) {
  if (_fbReady) { cb(); } else { _fbCallbacks.push(cb); }
}

function initFirebase() {
  if (typeof firebase === 'undefined') { setTimeout(initFirebase, 100); return; }
  if (_db) return;
  try {
    const app = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(FIREBASE_CONFIG);
    _db = firebase.database(app);
    _fbReady = true;
    _fbCallbacks.forEach(function(cb){ cb(); });
    _fbCallbacks = [];
  } catch(e) { console.error('Firebase init error:', e); }
}

// ── AUTH ───────────────────────────────────────────────────────────────────
function isLoggedIn() {
  return sessionStorage.getItem('esnl_auth') === '1';
}

function login(password, cb) {
  // SHA-256 da password
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(password))
    .then(function(buf) {
      var hash = Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
      if (hash === ADMIN_HASH) {
        sessionStorage.setItem('esnl_auth', '1');
        cb(true);
      } else {
        cb(false);
      }
    });
}

function logout() {
  sessionStorage.removeItem('esnl_auth');
  location.href = 'index.html';
}

function requireAuth() {
  if (!isLoggedIn()) { location.href = 'index.html'; return false; }
  return true;
}

// ── DATABASE ───────────────────────────────────────────────────────────────
function dbRef(path) {
  return _db ? _db.ref(path) : null;
}

function dbGet(path, cb) {
  onFirebaseReady(function() {
    _db.ref(path).once('value', function(snap) { cb(snap.val()); });
  });
}

function dbSet(path, data, cb) {
  onFirebaseReady(function() {
    _db.ref(path).set(data, function(err) { if(cb) cb(err); });
  });
}

function dbUpdate(path, data, cb) {
  onFirebaseReady(function() {
    _db.ref(path).update(data, function(err) { if(cb) cb(err); });
  });
}

function dbRemove(path, cb) {
  onFirebaseReady(function() {
    _db.ref(path).remove(function(err) { if(cb) cb(err); });
  });
}

function dbPush(path, data, cb) {
  onFirebaseReady(function() {
    var ref = _db.ref(path).push(data, function(err) { if(cb) cb(err, ref.key); });
  });
}

// ── ENTIDADES ──────────────────────────────────────────────────────────────
function getEntitiesLocal() {
  try { return JSON.parse(localStorage.getItem('esnl_entities_cache') || '[]'); }
  catch(e) { return []; }
}

function loadEntities(cb) {
  dbGet('entidades', function(data) {
    var arr = data ? Object.keys(data).map(function(k){ var e=data[k]; e.id=k; return e; }) : [];
    arr.sort(function(a,b){ return (a.nome||'').localeCompare(b.nome||''); });
    localStorage.setItem('esnl_entities_cache', JSON.stringify(arr));
    cb(arr);
  });
}

function saveEntity(entity, cb) {
  var id = entity.id || _db.ref('entidades').push().key;
  entity.id = id;
  dbSet('entidades/' + id, entity, function(err) {
    if (!err) {
      var arr = getEntitiesLocal();
      var idx = arr.findIndex(function(e){ return e.id===id; });
      if (idx>=0) arr[idx]=entity; else arr.push(entity);
      localStorage.setItem('esnl_entities_cache', JSON.stringify(arr));
    }
    if(cb) cb(err, id);
  });
}

function getCurrentEntityId() {
  return localStorage.getItem('esnl_current_entity') || '';
}

function setCurrentEntityId(id) {
  localStorage.setItem('esnl_current_entity', id);
}

// ── DIÁRIO ─────────────────────────────────────────────────────────────────
function loadDiario(entityId, ano, cb) {
  dbGet('diario/' + entityId + '/' + ano, function(data) {
    var arr = data ? Object.keys(data).map(function(k){ var l=data[k]; l.fbKey=k; return l; }) : [];
    arr.sort(function(a,b){ return (b.data||'').localeCompare(a.data||''); });
    cb(arr);
  });
}

function saveLancamento(entityId, ano, lanc, cb) {
  var path = 'diario/' + entityId + '/' + ano;
  if (lanc.fbKey) {
    dbSet(path + '/' + lanc.fbKey, lanc, cb);
  } else {
    dbPush(path, lanc, cb);
  }
}

function deleteLancamento(entityId, ano, fbKey, cb) {
  dbRemove('diario/' + entityId + '/' + ano + '/' + fbKey, cb);
}

// ── CÁLCULOS ───────────────────────────────────────────────────────────────
function calcResultadoFromLancs(lancs) {
  var rend=0, gasto=0, caixa=0, banco=0;
  lancs.forEach(function(l) {
    (l.movimentos||[]).forEach(function(m) {
      var v = m.dc==='D' ? m.valor : -m.valor;
      if (m.conta && m.conta.startsWith('11')) caixa += v;
      if (m.conta && (m.conta.startsWith('12')||m.conta.startsWith('13'))) banco += v;
      if (m.dc==='D' && m.tipo==='gasto') gasto += m.valor;
      if (m.dc==='C' && m.tipo==='rendimento') rend += m.valor;
    });
  });
  return { rend:rend, gasto:gasto, resultado:rend-gasto, caixa:Math.max(caixa,0), banco:Math.max(banco,0) };
}

// ── FORMATAÇÃO ─────────────────────────────────────────────────────────────
function fmt(v) {
  return parseFloat(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(d) {
  if(!d) return '';
  var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}
function hojeISO() {
  return new Date().toISOString().split('T')[0];
}
function hoje() {
  return new Date().toLocaleDateString('pt-PT',{day:'numeric',month:'long',year:'numeric'});
}

function showToast(msg, type) {
  var t=document.getElementById('_toast');
  if(!t){
    t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:20px;right:20px;background:#1a2a45;border:1px solid #c8943a;border-radius:8px;padding:10px 16px;font-size:13px;color:#e8edf5;box-shadow:0 8px 24px rgba(0,0,0,.5);transform:translateY(20px);opacity:0;transition:all .3s;z-index:9999;pointer-events:none;font-family:Outfit,sans-serif;max-width:320px';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.borderColor=type==='error'?'#e05050':'#c8943a';
  t.style.opacity='1';t.style.transform='translateY(0)';
  clearTimeout(t._tmr);
  t._tmr=setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(20px)';},2800);
}

function getContaByCode(code) {
  return PLANO_CONTAS.find(c => c.c === code);
}

function searchContas(query) {
  const q = query.toLowerCase().trim();
  if (!q) return [];
  return PLANO_CONTAS.filter(c =>
    c.c.startsWith(q) || c.n.toLowerCase().includes(q)
  ).slice(0, 40);
}

<script>

if(!requireAuth()) {}

function loadDash() {
  var ano = document.getElementById('sel-ano').value;
  var entities = getEntitiesLocal();
  if (!entities.length) {
    loadEntities(function(arr) {
      if (arr.length && !getCurrentEntityId()) setCurrentEntityId(arr[0].id);
      document.getElementById('sidebar-wrap').innerHTML = buildSidebar('dashboard');
      renderDash(arr, ano);
    });
  } else {
    document.getElementById('sidebar-wrap').innerHTML = buildSidebar('dashboard');
    renderDash(entities, ano);
  }
}

function renderDash(entities, ano) {
  var curId = getCurrentEntityId() || (entities[0]||{}).id || '';
  var curEnt = entities.find(function(e){return e.id===curId;}) || entities[0] || {};

  var MODS = [
    {href:'entidades.html', icon:'🏛️', name:'Entidades',       desc:'Gerir associações, NIFs, logótipos e órgãos sociais'},
    {href:'diario.html',    icon:'📒', name:'Diário',           desc:'Lançamentos SNC-ESNL com validação automática'},
    {href:'efatura.html',   icon:'📥', name:'Importar eFatura', desc:'Importar CSV do Portal AT — compras e vendas'},
    {href:'balancetes.html',icon:'📊', name:'Balancetes',       desc:'Balancetes mensais, anuais e comparativos'},
    {href:'balanco.html',   icon:'⚖️', name:'Balanço · DRN',   desc:'Demonstrações financeiras SNC-ESNL oficiais'},
    {href:'documentos.html',icon:'📄', name:'Documentos',       desc:'Relatório e Contas, convocatórias, atas, AT'},
  ];

  var html = '<div style="background:linear-gradient(135deg,var(--navy3),var(--navy4));border:1px solid var(--border);border-radius:12px;padding:22px 26px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">'
    +'<div><h1 style="font-family:Cormorant Garamond,serif;font-size:24px;font-weight:600;margin-bottom:4px;color:var(--text)">Bom dia</h1>'
    +'<p style="font-size:13px;color:var(--text2)">Sistema SNC-ESNL · Exercício '+ano+' · '+new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'})+'</p></div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
    +'<span style="background:rgba(74,184,122,.12);color:var(--green);border:1px solid rgba(74,184,122,.2);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:500">✓ Firebase conectado</span>'
    +'<span style="background:rgba(200,148,58,.12);color:var(--gold2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:500">'+entities.length+' entidades</span>'
    +'</div></div>';

  // KPI entidade atual
  html += '<div id="kpi-area" style="margin-bottom:24px"><div style="font-size:13px;color:var(--text2);padding:20px;text-align:center">A carregar dados de '+( curEnt.nome||'—')+'...</div></div>';

  // Módulos
  html += '<div style="font-family:Cormorant Garamond,serif;font-size:17px;font-weight:600;color:var(--text2);margin-bottom:14px">Módulos</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">'
    +MODS.map(function(m){
      return '<a href="'+m.href+'" style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:20px;display:block;transition:all .25s;position:relative">'
        +'<div style="font-size:26px;margin-bottom:10px">'+m.icon+'</div>'
        +'<div style="font-family:Cormorant Garamond,serif;font-size:16px;font-weight:600;margin-bottom:5px;color:var(--text)">'+m.name+'</div>'
        +'<div style="font-size:12px;color:var(--text2);line-height:1.5">'+m.desc+'</div>'
        +'<div style="position:absolute;right:14px;top:14px;color:var(--silver);font-size:14px">›</div>'
        +'</a>';
    }).join('')+'</div>';

  document.getElementById('dash-content').innerHTML = html;

  // Carregar KPIs do Firebase
  if (curId) {
    loadDiario(curId, ano, function(lancs) {
      var res = calcResultadoFromLancs(lancs);
      var kpis = [
        {l:'Rendimentos '+ano, v:fmt(res.rend)+' €',      c:'var(--green)',                               href:'balancetes.html'},
        {l:'Gastos '+ano,      v:fmt(res.gasto)+' €',     c:'var(--red)',                                href:'balancetes.html'},
        {l:'Resultado',        v:fmt(res.resultado)+' €', c:res.resultado>=0?'var(--green)':'var(--red)', href:'balanco.html'},
        {l:'Meios financeiros', v:fmt(res.caixa+res.banco)+' €', c:'var(--gold2)',                       href:'diario.html'},
      ];
      var kpiHtml = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">'
        +kpis.map(function(k){
          return '<a href="'+k.href+'" style="background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:16px 18px;display:block;transition:all .2s;position:relative;overflow:hidden">'
            +'<div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--silver);margin-bottom:8px">'+k.l+'</div>'
            +'<div style="font-family:JetBrains Mono,monospace;font-size:18px;font-weight:500;color:'+k.c+';margin-bottom:4px">'+k.v+'</div>'
            +'<div style="position:absolute;top:0;left:0;right:0;height:2px;background:'+k.c+';opacity:.5"></div>'
            +'</a>';
        }).join('')+'</div>';
      var kpiArea = document.getElementById('kpi-area');
      if (kpiArea) kpiArea.innerHTML = kpiHtml;
    });
  }
}

onFirebaseReady(function() {
  loadEntities(function(arr) {
    if (arr.length && !getCurrentEntityId()) setCurrentEntityId(arr[0].id);
    var ano = document.getElementById('sel-ano').value;
    document.getElementById('sidebar-wrap').innerHTML = buildSidebar('dashboard');
    renderDash(arr, ano);
  });
});

</script>
