  authDomain: "esnl-contabilidade.firebaseapp.com",

// Firebase SDK (v9 compat)
let _db = null;
let _fbReady = false;
let _fbCallbacks = [];

function onFirebaseReady(cb) {
  if (_fbReady) { cb(); } else { _fbCallbacks.push(cb); }
}

function initFirebase() {
  if (typeof firebase === 'undefined') { setTimeout(initFirebase, 100); return; }
  if (_db) return;
  try {
    const app = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(FIREBASE_CONFIG);
    _db = firebase.database(app);
    _fbReady = true;
    _fbCallbacks.forEach(function(cb){ cb(); });
    _fbCallbacks = [];
  } catch(e) { console.error('Firebase init error:', e); }
}

// ── AUTH ───────────────────────────────────────────────────────────────────
function isLoggedIn() {
  return sessionStorage.getItem('esnl_auth') === '1';
}

function login(password, cb) {
  // SHA-256 da password
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(password))
    .then(function(buf) {
      var hash = Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
      if (hash === ADMIN_HASH) {
        sessionStorage.setItem('esnl_auth', '1');
        cb(true);
      } else {
        cb(false);
      }
    });
}

function logout() {
  sessionStorage.removeItem('esnl_auth');
  location.href = 'index.html';
}

function requireAuth() {
  if (!isLoggedIn()) { location.href = 'index.html'; return false; }
  return true;
}

// ── DATABASE ───────────────────────────────────────────────────────────────
function dbRef(path) {
  return _db ? _db.ref(path) : null;
}

function dbGet(path, cb) {
  onFirebaseReady(function() {
    _db.ref(path).once('value', function(snap) { cb(snap.val()); });
  });
}

function dbSet(path, data, cb) {
  onFirebaseReady(function() {
    _db.ref(path).set(data, function(err) { if(cb) cb(err); });
  });
}

function dbUpdate(path, data, cb) {
  onFirebaseReady(function() {
    _db.ref(path).update(data, function(err) { if(cb) cb(err); });
  });
}

function dbRemove(path, cb) {
  onFirebaseReady(function() {
    _db.ref(path).remove(function(err) { if(cb) cb(err); });
  });
}

function dbPush(path, data, cb) {
  onFirebaseReady(function() {
    var ref = _db.ref(path).push(data, function(err) { if(cb) cb(err, ref.key); });
  });
}

// ── ENTIDADES ──────────────────────────────────────────────────────────────
function getEntitiesLocal() {
  try { return JSON.parse(localStorage.getItem('esnl_entities_cache') || '[]'); }
  catch(e) { return []; }
}

function loadEntities(cb) {
  dbGet('entidades', function(data) {
    var arr = data ? Object.keys(data).map(function(k){ var e=data[k]; e.id=k; return e; }) : [];
    arr.sort(function(a,b){ return (a.nome||'').localeCompare(b.nome||''); });
    localStorage.setItem('esnl_entities_cache', JSON.stringify(arr));
    cb(arr);
  });
}

function saveEntity(entity, cb) {
  var id = entity.id || _db.ref('entidades').push().key;
  entity.id = id;
  dbSet('entidades/' + id, entity, function(err) {
    if (!err) {
      var arr = getEntitiesLocal();
      var idx = arr.findIndex(function(e){ return e.id===id; });
      if (idx>=0) arr[idx]=entity; else arr.push(entity);
      localStorage.setItem('esnl_entities_cache', JSON.stringify(arr));
    }
    if(cb) cb(err, id);
  });
}

function getCurrentEntityId() {
  return localStorage.getItem('esnl_current_entity') || '';
}

function setCurrentEntityId(id) {
  localStorage.setItem('esnl_current_entity', id);
}

// ── DIÁRIO ─────────────────────────────────────────────────────────────────
function loadDiario(entityId, ano, cb) {
  dbGet('diario/' + entityId + '/' + ano, function(data) {
    var arr = data ? Object.keys(data).map(function(k){ var l=data[k]; l.fbKey=k; return l; }) : [];
    arr.sort(function(a,b){ return (b.data||'').localeCompare(a.data||''); });
    cb(arr);
  });
}

function saveLancamento(entityId, ano, lanc, cb) {
  var path = 'diario/' + entityId + '/' + ano;
  if (lanc.fbKey) {
    dbSet(path + '/' + lanc.fbKey, lanc, cb);
  } else {
    dbPush(path, lanc, cb);
  }
}

function deleteLancamento(entityId, ano, fbKey, cb) {
  dbRemove('diario/' + entityId + '/' + ano + '/' + fbKey, cb);
}

// ── CÁLCULOS ───────────────────────────────────────────────────────────────
function calcResultadoFromLancs(lancs) {
  var rend=0, gasto=0, caixa=0, banco=0;
  lancs.forEach(function(l) {
    (l.movimentos||[]).forEach(function(m) {
      var v = m.dc==='D' ? m.valor : -m.valor;
      if (m.conta && m.conta.startsWith('11')) caixa += v;
      if (m.conta && (m.conta.startsWith('12')||m.conta.startsWith('13'))) banco += v;
      if (m.dc==='D' && m.tipo==='gasto') gasto += m.valor;
      if (m.dc==='C' && m.tipo==='rendimento') rend += m.valor;
    });
  });
  return { rend:rend, gasto:gasto, resultado:rend-gasto, caixa:Math.max(caixa,0), banco:Math.max(banco,0) };
}

// ── FORMATAÇÃO ─────────────────────────────────────────────────────────────
function fmt(v) {
  return parseFloat(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(d) {
  if(!d) return '';
  var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}
function hojeISO() {
  return new Date().toISOString().split('T')[0];
}
function hoje() {
  return new Date().toLocaleDateString('pt-PT',{day:'numeric',month:'long',year:'numeric'});
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  var t=document.getElementById('_toast');
  if(!t){
    t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:20px;right:20px;background:#1a2a45;border:1px solid #c8943a;border-radius:8px;padding:10px 16px;font-size:13px;color:#e8edf5;box-shadow:0 8px 24px rgba(0,0,0,.5);transform:translateY(20px);opacity:0;transition:all .3s;z-index:9999;pointer-events:none;font-family:Outfit,sans-serif;max-width:320px';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.borderColor=type==='error'?'#e05050':'#c8943a';
  t.style.opacity='1';t.style.transform='translateY(0)';
  clearTimeout(t._tmr);
  t._tmr=setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(20px)';},2800);
}

    +'<div class="sb-entity-sub">NIF '+(curEnt.nif||'—')+'</div></div>'

    html+='<div class="sb-section-label">'+sec.label+'</div>';

        +'<span class="nav-icon">'+m.icon+'</span>'
        +'<span class="nav-label">'+m.label+'</span></a>';
    });
  });
  html+='</nav>'
    +'<div class="sb-footer">'

    +'<div class="sb-footer-copy" style="margin-top:8px">© Rui Gonçalves · SNC-ESNL</div>'

  return html;
}

function openEntitySwitcher() {
  if(document.getElementById('_es_ov')) return;
  var entities=getEntitiesLocal();
  var cur=getCurrentEntityId();
  var html='<div id="_es_ov" onclick="if(event.target===this)closeEntitySwitcher()" style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-start;justify-content:flex-start;padding:70px 0 0 14px">'
    +'<div style="background:#111d35;border:1px solid rgba(200,148,58,.18);border-radius:12px;width:320px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6)">'
    +'<div style="padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.06);font-family:Cormorant Garamond,serif;font-size:16px;font-weight:600;color:#e8edf5">Selecionar entidade</div>';
  entities.forEach(function(e){
    var sel=e.id===cur;
    html+='<div onclick="switchEntity(\''+e.id+'\')" style="padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;background:'+(sel?'rgba(200,148,58,.08)':'transparent')+';border-left:'+(sel?'2px solid #c8943a':'2px solid transparent')+'">'
      +'<div style="width:34px;height:34px;border-radius:8px;background:#1a2a45;border:1px solid rgba(200,148,58,.2);display:flex;align-items:center;justify-content:center;font-family:Cormorant Garamond,serif;font-size:13px;font-weight:600;color:#e0a84a;flex-shrink:0">'+(e.sigla||e.nome.substring(0,2).toUpperCase())+'</div>'

  });
  html+='<div onclick="location.href=\'entidades.html\'" style="padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:11px">'
    +'<div style="width:34px;height:34px;border-radius:8px;background:rgba(200,148,58,.1);border:1px solid rgba(200,148,58,.3);display:flex;align-items:center;justify-content:center;font-size:18px;color:#e0a84a">+</div>'
    +'<div style="font-size:13px;font-weight:500;color:#e0a84a">Nova associação</div></div>'
    +'</div></div>';

}

function closeEntitySwitcher(){var el=document.getElementById('_es_ov');if(el)el.remove();}

function switchEntity(id){
  setCurrentEntityId(id);
  closeEntitySwitcher();
  location.reload();

function getContaByCode(code) {
  return PLANO_CONTAS.find(c => c.c === code);
}

function _semAcentos(s){
  return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}
function searchContas(query) {
  const q = _semAcentos(query.toLowerCase().trim());
  if (!q) return [];
  return PLANO_CONTAS.filter(c =>
    c.c.startsWith(q) || _semAcentos(c.n.toLowerCase()).includes(q)
  ).slice(0, 40);
}

  loadEntities(function(arr){

    var cur=getCurrentEntityId();
    arr.forEach(function(e){
      var o=document.createElement('option');
      o.value=e.id;o.textContent=e.nome;
      if(e.id===cur)o.selected=true;

  });

  if(savedAno) document.getElementById('sel-ano').value=savedAno;
  loadData();
}

  var ano=document.getElementById('sel-ano').value;
  localStorage.setItem('esnl_diario_ano_'+ent, ano);
  var anoPrev=String(parseInt(ano)-1);
  setCurrentEntityId(ent);
  document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:60px;color:var(--silver)"><span class="spin"></span>A carregar diário...</div>';
  loadDiario(ent,ano,function(lancs){
    allLancs=lancs;
    loadDiario(ent,anoPrev,function(lp){
      allLancsPrev=lp;
      render();
    });
  });
}

function calcSaldosFromLancs(lancs,periodo){
  var s={};
  lancs.forEach(function(l){
    if(periodo&&periodo!=='anual'){var m=(l.data||'').substring(5,7);if(m!==periodo)return;}
    (l.movimentos||[]).forEach(function(m){
      if(!s[m.conta])s[m.conta]={D:0,C:0,tipo:m.tipo,nome:m.nome};
      if(m.dc==='D')s[m.conta].D+=m.valor;else s[m.conta].C+=m.valor;
    });
  });
  return s;
}

function getSaldo(c,saldos,tipo){
  var sv=saldos[c];if(!sv)return 0;
  var diff=sv.D-sv.C;
  if(['gasto','ativo','caixa'].includes(tipo))return diff;
  return -diff;
}

function render(){
  var per=document.getElementById('sel-per').value;
  var ano=document.getElementById('sel-ano').value;
  var ent=document.getElementById('sel-ent').value;
  var entNome=(document.getElementById('sel-ent').selectedOptions[0]||{}).text||'';
  var s=calcSaldosFromLancs(allLancs,per);
  var sp=calcSaldosFromLancs(allLancsPrev,'anual');
  var perLabel=per==='anual'?'Exercício '+ano:MESES[parseInt(per)]+' '+ano;
  var anoPrev=String(parseInt(ano)-1);

  // KPIs
  var res=calcResultadoFromLancs(allLancs);
  var cont=document.getElementById('main-content');
  var html='<div class="kcards">'
    +'<div class="kc"><div class="kl">Total débitos</div><div class="kv" style="color:var(--gold2)">'+fmt(Object.values(s).reduce(function(a,v){return a+v.D;},0))+' €</div></div>'
    +'<div class="kc"><div class="kl">Total créditos</div><div class="kv" style="color:var(--gold2)">'+fmt(Object.values(s).reduce(function(a,v){return a+v.C;},0))+' €</div></div>'
    +'<div class="kc"><div class="kl">Total gastos</div><div class="kv" style="color:var(--red)">'+fmt(res.gasto)+' €</div></div>'
    +'<div class="kc"><div class="kl">Total rendimentos</div><div class="kv" style="color:var(--green)">'+fmt(res.rend)+' €</div></div>'
    +'<div class="kc"><div class="kl">Resultado</div><div class="kv" style="color:'+(res.resultado>=0?'var(--green)':'var(--red)')+'">'+fmt(res.resultado)+' €</div></div>'
    +'</div>';

  // Tabela
  html+='<div class="bwrap">'
    +'<div class="bhdr"><div><div class="btit">Balancete de verificação</div><div class="bsub">'+entNome+' · '+perLabel+'</div></div>'
    +'<div id="eq-badge"></div></div>'
    +'<div class="fbar no-print">'
    +'<input type="text" id="bal-search" placeholder="Filtrar conta..." oninput="filterBal(this.value)">'
    +'<label><input type="checkbox" id="chk-zero" onchange="filterBal(document.getElementById(\'bal-search\').value)"> Ocultar saldo zero</label>'
    +'</div>'
    +'<div style="overflow-x:auto">';

  if(curView==='s') html+=renderSimples(s);
  else if(curView==='m') html+=renderMovimentos(s);
  else html+=renderComparativo(s,sp,ano,anoPrev);

  html+='</div></div>';
  cont.innerHTML=html;

  // Badge equilíbrio
  var tD=0,tC=0;
  var seen=new Set();
  PLANO_CONTAS.filter(function(p){return s[p.c]&&!seen.has(p.c)&&seen.add(p.c);}).forEach(function(p){
    var sal=getSaldo(p.c,s,p.t);
    if(['gasto','ativo','caixa'].includes(p.t))tD+=Math.max(sal,0);
    else tC+=Math.max(sal,0);
  });
  var eq=Math.abs(tD-tC)<0.01;
  var bd=document.getElementById('eq-badge');
  if(bd)bd.innerHTML='<span class="eqbadge '+(eq?'eq-ok':'eq-err')+'">'+(eq?'✓ Equilibrado':'⚠ Diferença: '+fmt(Math.abs(tD-tC))+' €')+'</span>';
}

function renderSimples(s){
  var seen=new Set();
  var plano=PLANO_CONTAS.filter(function(p){return s[p.c]&&!seen.has(p.c)&&seen.add(p.c);});
  plano.sort(function(a,b){return a.c.localeCompare(b.c);});
  var html='<table class="btable" id="btbl"><thead><tr>'
    +'<th>Conta</th><th>Designação</th><th>Tipo</th>'
    +'<th class="r">Saldo devedor</th><th class="r">Saldo credor</th>'
    +'</tr></thead><tbody id="tbody">';
  var lastCl=-1,gD=0,gC=0;
  plano.forEach(function(p){
    if(p.cl!==lastCl){
      html+='<tr class="tr-sec"><td colspan="5"><span style="font-family:Cormorant Garamond,serif;font-size:14px;font-weight:600;color:var(--text)">'+(CLASSES[p.cl]||'Classe '+p.cl)+'</span></td></tr>';
      lastCl=p.cl;
    }
    var sal=getSaldo(p.c,s,p.t);
    var salD=['gasto','ativo','caixa'].includes(p.t)?Math.max(sal,0):0;
    var salC=['passivo','capital','rendimento'].includes(p.t)?Math.max(sal,0):0;
    gD+=salD;gC+=salC;
    var zer=Math.abs(sal)<0.01;
    html+='<tr class="conta-row'+(zer?' tr-zer':'')+'" data-conta="'+p.c+'" data-nome="'+p.n.toLowerCase()+'">'
      +'<td><span class="cc">'+p.c+'</span></td>'
      +'<td style="font-size:13px">'+p.n+'</td>'
      +'<td><span class="tb '+p.t+'">'+p.t+'</span></td>'
      +'<td class="'+(salD>0.005?'vd':'vz')+'">'+(salD>0.005?fmt(salD):'—')+'</td>'
      +'<td class="'+(salC>0.005?'vc':'vz')+'">'+(salC>0.005?fmt(salC):'—')+'</td>'
      +'</tr>';
  });
  html+='<tr class="tr-tot"><td colspan="3" style="font-family:Cormorant Garamond,serif;font-size:14px">Total geral</td>'
    +'<td class="mn" style="color:var(--red);font-size:14px">'+fmt(gD)+' €</td>'
    +'<td class="mn" style="color:var(--green);font-size:14px">'+fmt(gC)+' €</td>'
    +'</tr></tbody></table>';
  return html;
}

function renderMovimentos(s){
  var seen=new Set();
  var plano=PLANO_CONTAS.filter(function(p){return s[p.c]&&!seen.has(p.c)&&seen.add(p.c);});
  plano.sort(function(a,b){return a.c.localeCompare(b.c);});
  var html='<table class="btable" id="btbl"><thead><tr>'
    +'<th>Conta</th><th>Designação</th><th>Tipo</th>'
    +'<th class="r">Mov. Débito</th><th class="r">Mov. Crédito</th>'
    +'<th class="r">Saldo devedor</th><th class="r">Saldo credor</th>'
    +'</tr></thead><tbody id="tbody">';
  var lastCl=-1;
  plano.forEach(function(p){
    if(p.cl!==lastCl){
      html+='<tr class="tr-sec"><td colspan="7"><span style="font-family:Cormorant Garamond,serif;font-size:14px;font-weight:600;color:var(--text)">'+(CLASSES[p.cl]||'Classe '+p.cl)+'</span></td></tr>';
      lastCl=p.cl;
    }
    var sv=s[p.c]||{D:0,C:0};
    var sal=getSaldo(p.c,s,p.t);
    var salD=['gasto','ativo','caixa'].includes(p.t)?Math.max(sal,0):0;
    var salC=['passivo','capital','rendimento'].includes(p.t)?Math.max(sal,0):0;
    html+='<tr class="conta-row" data-conta="'+p.c+'" data-nome="'+p.n.toLowerCase()+'">'
      +'<td><span class="cc">'+p.c+'</span></td>'
      +'<td style="font-size:13px">'+p.n+'</td>'
      +'<td><span class="tb '+p.t+'">'+p.t+'</span></td>'
      +'<td class="'+(sv.D>0.005?'vd':'vz')+'">'+(sv.D>0.005?fmt(sv.D):'—')+'</td>'
      +'<td class="'+(sv.C>0.005?'vc':'vz')+'">'+(sv.C>0.005?fmt(sv.C):'—')+'</td>'
      +'<td class="'+(salD>0.005?'vd':'vz')+'">'+(salD>0.005?fmt(salD):'—')+'</td>'
      +'<td class="'+(salC>0.005?'vc':'vz')+'">'+(salC>0.005?fmt(salC):'—')+'</td>'
      +'</tr>';
  });
  html+='</tbody></table>';
  return html;
}

function renderComparativo(s,sp,ano,anoPrev){
  var all=new Set();
  PLANO_CONTAS.forEach(function(p){if(s[p.c]||sp[p.c])all.add(p.c);});
  var seen=new Set();
  var plano=PLANO_CONTAS.filter(function(p){return all.has(p.c)&&!seen.has(p.c)&&seen.add(p.c);});
  plano.sort(function(a,b){return a.c.localeCompare(b.c);});
  var html='<table class="btable" id="btbl"><thead>'
    +'<tr><th colspan="3"></th>'
    +'<th class="r" colspan="2" style="color:var(--blue)">'+ano+'</th>'
    +'<th class="r" colspan="2" style="color:var(--silver)">'+anoPrev+'</th>'
    +'<th class="r" style="color:var(--amber)">Δ</th></tr>'
    +'<tr><th>Conta</th><th>Designação</th><th>Tipo</th>'
    +'<th class="r">Dev.</th><th class="r">Cred.</th>'
    +'<th class="r">Dev.</th><th class="r">Cred.</th>'
    +'<th class="r">Variação</th></tr></thead><tbody id="tbody">';
  var lastCl=-1;
  plano.forEach(function(p){
    if(p.cl!==lastCl){
      html+='<tr class="tr-sec"><td colspan="8"><span style="font-family:Cormorant Garamond,serif;font-size:14px;font-weight:600;color:var(--text)">'+(CLASSES[p.cl]||'Classe '+p.cl)+'</span></td></tr>';
      lastCl=p.cl;
    }
    var sal=getSaldo(p.c,s,p.t);
    var salP=getSaldo(p.c,sp,p.t);
    var salD=['gasto','ativo','caixa'].includes(p.t)?Math.max(sal,0):0;
    var salC=['passivo','capital','rendimento'].includes(p.t)?Math.max(sal,0):0;
    var salPD=['gasto','ativo','caixa'].includes(p.t)?Math.max(salP,0):0;
    var salPC=['passivo','capital','rendimento'].includes(p.t)?Math.max(salP,0):0;
    var delta=sal-salP;
    html+='<tr class="conta-row" data-conta="'+p.c+'" data-nome="'+p.n.toLowerCase()+'">'
      +'<td><span class="cc">'+p.c+'</span></td>'
      +'<td style="font-size:13px">'+p.n+'</td>'
      +'<td><span class="tb '+p.t+'">'+p.t+'</span></td>'
      +'<td class="'+(salD>0.005?'vd':'vz')+'">'+(salD>0.005?fmt(salD):'—')+'</td>'
      +'<td class="'+(salC>0.005?'vc':'vz')+'">'+(salC>0.005?fmt(salC):'—')+'</td>'
      +'<td class="'+(salPD>0.005?'vd':'vz')+'" style="opacity:.6">'+(salPD>0.005?fmt(salPD):'—')+'</td>'
      +'<td class="'+(salPC>0.005?'vc':'vz')+'" style="opacity:.6">'+(salPC>0.005?fmt(salPC):'—')+'</td>'
      +'<td class="mn" style="color:'+(Math.abs(delta)<0.005?'var(--silver)':delta>0?'var(--green)':'var(--red)')+'">'+(Math.abs(delta)<0.005?'—':(delta>0?'+':'')+fmt(delta))+'</td>'
      +'</tr>';
  });
  html+='</tbody></table>';
  return html;
}

function filterBal(q){
  var hz=document.getElementById('chk-zero')&&document.getElementById('chk-zero').checked;
  var sq=(q||'').toLowerCase();
  document.querySelectorAll('.conta-row').forEach(function(tr){
    var c=tr.dataset.conta||'';
    var n=tr.dataset.nome||'';
    var match=!sq||(c.includes(sq)||n.includes(sq));
    var zer=tr.classList.contains('tr-zer');
    tr.style.display=(match&&!(hz&&zer))?'':'none';
  });
}

function setView(v,btn){
  curView=v;
  document.querySelectorAll('.vtab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  render();
}
</script>
</body>
</html>
