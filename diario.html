<!DOCTYPE html>
<html lang="pt">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
.dlyt{display:grid;grid-template-columns:360px 1fr;height:calc(100vh - 61px);overflow:hidden}
.fpan{background:var(--navy2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.fpan::-webkit-scrollbar{width:3px}
.fphdr{padding:16px 18px 12px;border-bottom:1px solid rgba(200,148,58,.1)}
.fptit{font-family:Cormorant Garamond,serif;font-size:18px;font-weight:600;margin-bottom:2px;color:var(--text)}
.fpbody{padding:14px 18px;flex:1}
.movbox{background:var(--surface);border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:10px}
.mbhdr{padding:7px 12px;background:rgba(200,148,58,.05);border-bottom:1px solid var(--border2);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold2);display:flex;align-items:center;gap:6px;font-weight:500}
.mrow{display:grid;grid-template-columns:1fr 100px;gap:8px;padding:10px 12px;align-items:end}
.cwrap{position:relative}
.cdrop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--navy3);border:1px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
.cdrop::-webkit-scrollbar{width:3px}
.cdi{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.03)}
.cdi:hover{background:rgba(200,148,58,.1)}
.cdc{font-family:JetBrains Mono,monospace;font-size:11px;color:var(--gold2);min-width:44px;font-weight:500}
.cdn{font-size:12px;color:var(--text2)}
.cdt{font-size:9px;padding:1px 5px;border-radius:3px;margin-left:auto;font-weight:600;text-transform:uppercase}
.cdt.ativo{background:rgba(74,144,217,.15);color:var(--blue)}
.cdt.passivo{background:rgba(224,80,80,.12);color:var(--red)}
.cdt.capital{background:rgba(74,184,122,.12);color:var(--green)}
.cdt.gasto{background:rgba(224,80,80,.1);color:#e07070}
.cdt.rendimento{background:rgba(74,184,122,.1);color:#70c890}
.cdt.caixa{background:rgba(200,148,58,.12);color:var(--gold2)}
.cgh{padding:5px 12px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--silver);background:rgba(0,0,0,.2);font-weight:500;position:sticky;top:0}
.cpbtns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.cpbtn{padding:7px;border-radius:6px;font-size:12px;cursor:pointer;font-family:Outfit,sans-serif;transition:all .2s;border:1px solid var(--border2);background:transparent;color:var(--text2);font-weight:500}
.cpbtn:hover{border-color:var(--gold);color:var(--gold2)}
.bbar{border-radius:8px;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:12px;transition:all .3s}
.bb-ok{background:rgba(74,184,122,.08);border:1px solid rgba(74,184,122,.25);color:var(--green)}
.bb-nok{background:rgba(224,80,80,.08);border:1px solid rgba(224,80,80,.2);color:var(--red)}
.bb-z{background:rgba(138,154,181,.06);border:1px solid rgba(138,154,181,.15);color:var(--silver)}
.bbval{font-family:JetBrains Mono,monospace;font-size:13px;font-weight:500}
.jpan{background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
.jpan::-webkit-scrollbar{width:3px}
.jtb{padding:12px 18px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px;background:var(--navy2);position:sticky;top:0;z-index:10;flex-wrap:wrap}
.jtit{font-family:Cormorant Garamond,serif;font-size:16px;font-weight:600;flex:1;color:var(--text)}
.jfi{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text);font-family:Outfit,sans-serif;outline:none}
.jfi:focus{border-color:var(--gold)}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;font-family:JetBrains Mono,monospace}
.pill-d{background:rgba(224,80,80,.1);color:var(--red);border:1px solid rgba(224,80,80,.2)}
.pill-c{background:rgba(74,184,122,.1);color:var(--green);border:1px solid rgba(74,184,122,.2)}
.jwrap{padding:0 18px 18px;flex:1}
.lg{border-bottom:1px solid var(--border2)}
.lhdr{display:grid;grid-template-columns:80px 1fr 90px;padding:9px 10px 5px;background:rgba(200,148,58,.03)}
.lnum{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--gold2);font-weight:500}
.ldesc{font-size:13px;font-weight:500;color:var(--text)}
.ldate{font-size:11px;color:var(--silver);text-align:right;font-family:JetBrains Mono,monospace}
.ldoc{font-size:10px;color:var(--silver);padding:0 10px 2px}
.ml{display:grid;grid-template-columns:40px 1fr 100px 100px;padding:4px 10px;align-items:center}
.ml:hover{background:rgba(255,255,255,.02)}
.mdc{font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;text-align:center}
.mdc.D{background:rgba(224,80,80,.1);color:var(--red)}
.mdc.C{background:rgba(74,184,122,.1);color:var(--green)}
.mco{font-family:JetBrains Mono,monospace;font-size:11px;color:var(--gold2);margin-right:6px}
.mnm{font-size:12px;color:var(--text2)}
.mv{font-family:JetBrains Mono,monospace;font-size:12px;text-align:right}
.mv.D{color:var(--red)} .mv.C{color:var(--green)}
.lact{display:flex;justify-content:flex-end;padding:3px 10px 7px}
.btd{padding:2px 9px;border-radius:4px;font-size:11px;cursor:pointer;font-family:Outfit,sans-serif;background:transparent;border-color:transparent;color:rgba(224,80,80,.5);border:1px solid}
.btd:hover{border-color:rgba(224,80,80,.3);color:var(--red)}
.sft{padding:10px 18px;border-top:1px solid var(--border);background:var(--navy2);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.sfi{display:flex;flex-direction:column;gap:1px}
.sfl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--silver)}
.sfv{font-family:JetBrains Mono,monospace;font-size:13px;font-weight:500}
.sfsep{width:1px;height:28px;background:var(--border2)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(200,148,58,.3);border-top-color:var(--gold);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="app-layout">

<script>
// ── ESNL Contabilidade v2 · Firebase Core ─────────────────────────────────
// © Rui Gonçalves · SNC-ESNL


const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBBHAI-u6nuAcn2KWgoZwsavyXZY6o4JhA",
  authDomain: "esnl-contabilidade.firebaseapp.com",
  databaseURL: "https://esnl-contabilidade-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "esnl-contabilidade",
  storageBucket: "esnl-contabilidade.firebasestorage.app",
  messagingSenderId: "829122453343",
  appId: "1:829122453343:web:7a516be90941a4761320ea"
};

const ADMIN_HASH = "21e0969c3460872a571aaa26f3873ebdc315c8e9d30668f39a47579c67c2b338";

// Firebase SDK (v9 compat)
let _db = null;
let _fbReady = false;
let _fbCallbacks = [];

function onFirebaseReady(cb) {
  if (_fbReady) { cb(); } else { _fbCallbacks.push(cb); }
}

function initFirebase() {
  if (typeof firebase === 'undefined') { setTimeout(initFirebase, 100); return; }
  if (_db) return;
  try {
    const app = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(FIREBASE_CONFIG);
    _db = firebase.database(app);
    _fbReady = true;
    _fbCallbacks.forEach(function(cb){ cb(); });
    _fbCallbacks = [];
  } catch(e) { console.error('Firebase init error:', e); }
}

// ── AUTH ───────────────────────────────────────────────────────────────────
function isLoggedIn() {
  return sessionStorage.getItem('esnl_auth') === '1';
}

function login(password, cb) {
  // SHA-256 da password
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(password))
    .then(function(buf) {
      var hash = Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
      if (hash === ADMIN_HASH) {
        sessionStorage.setItem('esnl_auth', '1');
        cb(true);
      } else {
        cb(false);
      }
    });
}

function logout() {
  sessionStorage.removeItem('esnl_auth');
  location.href = 'index.html';
}

function requireAuth() {
  if (!isLoggedIn()) { location.href = 'index.html'; return false; }
  return true;
}

// ── DATABASE ───────────────────────────────────────────────────────────────
function dbRef(path) {
  return _db ? _db.ref(path) : null;
}

function dbGet(path, cb) {
  onFirebaseReady(function() {
    _db.ref(path).once('value', function(snap) { cb(snap.val()); });
  });
}

function dbSet(path, data, cb) {
  onFirebaseReady(function() {
    _db.ref(path).set(data, function(err) { if(cb) cb(err); });
  });
}

function dbUpdate(path, data, cb) {
  onFirebaseReady(function() {
    _db.ref(path).update(data, function(err) { if(cb) cb(err); });
  });
}

function dbRemove(path, cb) {
  onFirebaseReady(function() {
    _db.ref(path).remove(function(err) { if(cb) cb(err); });
  });
}

function dbPush(path, data, cb) {
  onFirebaseReady(function() {
    var ref = _db.ref(path).push(data, function(err) { if(cb) cb(err, ref.key); });
  });
}

// ── ENTIDADES ──────────────────────────────────────────────────────────────
function getEntitiesLocal() {
  try { return JSON.parse(localStorage.getItem('esnl_entities_cache') || '[]'); }
  catch(e) { return []; }
}

function loadEntities(cb) {
  dbGet('entidades', function(data) {
    var arr = data ? Object.keys(data).map(function(k){ var e=data[k]; e.id=k; return e; }) : [];
    arr.sort(function(a,b){ return (a.nome||'').localeCompare(b.nome||''); });
    localStorage.setItem('esnl_entities_cache', JSON.stringify(arr));
    cb(arr);
  });
}

function saveEntity(entity, cb) {
  var id = entity.id || _db.ref('entidades').push().key;
  entity.id = id;
  dbSet('entidades/' + id, entity, function(err) {
    if (!err) {
      var arr = getEntitiesLocal();
      var idx = arr.findIndex(function(e){ return e.id===id; });
      if (idx>=0) arr[idx]=entity; else arr.push(entity);
      localStorage.setItem('esnl_entities_cache', JSON.stringify(arr));
    }
    if(cb) cb(err, id);
  });
}

function getCurrentEntityId() {
  return localStorage.getItem('esnl_current_entity') || '';
}

function setCurrentEntityId(id) {
  localStorage.setItem('esnl_current_entity', id);
}

// ── DIÁRIO ─────────────────────────────────────────────────────────────────
function loadDiario(entityId, ano, cb) {
  dbGet('diario/' + entityId + '/' + ano, function(data) {
    var arr = data ? Object.keys(data).map(function(k){ var l=data[k]; l.fbKey=k; return l; }) : [];
    arr.sort(function(a,b){ return (b.data||'').localeCompare(a.data||''); });
    cb(arr);
  });
}

function saveLancamento(entityId, ano, lanc, cb) {
  var path = 'diario/' + entityId + '/' + ano;
  if (lanc.fbKey) {
    dbSet(path + '/' + lanc.fbKey, lanc, cb);
  } else {
    dbPush(path, lanc, cb);
  }
}

function deleteLancamento(entityId, ano, fbKey, cb) {
  dbRemove('diario/' + entityId + '/' + ano + '/' + fbKey, cb);
}

// ── CÁLCULOS ───────────────────────────────────────────────────────────────
function calcResultadoFromLancs(lancs) {
  var rend=0, gasto=0, caixa=0, banco=0;
  lancs.forEach(function(l) {
    (l.movimentos||[]).forEach(function(m) {
      var v = m.dc==='D' ? m.valor : -m.valor;
      if (m.conta && m.conta.startsWith('11')) caixa += v;
      if (m.conta && (m.conta.startsWith('12')||m.conta.startsWith('13'))) banco += v;
      if (m.dc==='D' && m.tipo==='gasto') gasto += m.valor;
      if (m.dc==='C' && m.tipo==='rendimento') rend += m.valor;
    });
  });
  return { rend:rend, gasto:gasto, resultado:rend-gasto, caixa:Math.max(caixa,0), banco:Math.max(banco,0) };
}

// ── FORMATAÇÃO ─────────────────────────────────────────────────────────────
function fmt(v) {
  return parseFloat(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(d) {
  if(!d) return '';
  var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}
function hojeISO() {
  return new Date().toISOString().split('T')[0];
}
function hoje() {
  return new Date().toLocaleDateString('pt-PT',{day:'numeric',month:'long',year:'numeric'});
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  var t=document.getElementById('_toast');
  if(!t){
    t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:20px;right:20px;background:#1a2a45;border:1px solid #c8943a;border-radius:8px;padding:10px 16px;font-size:13px;color:#e8edf5;box-shadow:0 8px 24px rgba(0,0,0,.5);transform:translateY(20px);opacity:0;transition:all .3s;z-index:9999;pointer-events:none;font-family:Outfit,sans-serif;max-width:320px';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.borderColor=type==='error'?'#e05050':'#c8943a';
  t.style.opacity='1';t.style.transform='translateY(0)';
  clearTimeout(t._tmr);
  t._tmr=setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(20px)';},2800);
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
var _NAV=[
  {id:'dashboard', href:'dashboard.html', icon:'⊞',  label:'Dashboard'},
  {id:'entidades', href:'entidades.html', icon:'🏛️', label:'Entidades'},
  {id:'diario',    href:'diario.html',    icon:'📒',  label:'Diário'},
  {id:'efatura',   href:'efatura.html',   icon:'📥',  label:'Importar eFatura'},
  {id:'balancetes',href:'balancetes.html',icon:'📊',  label:'Balancetes'},
  {id:'balanco',   href:'balanco.html',   icon:'⚖️',  label:'Balanço · DRN'},
  {id:'documentos',href:'documentos.html',icon:'📄',  label:'Documentos'},
];
var _SECS=[
  {label:'Principal',     ids:['dashboard']},
  {label:'Contabilidade', ids:['entidades','diario','efatura']},
  {label:'Relatórios',    ids:['balancetes','balanco']},
  {label:'Documentos',    ids:['documentos']},
];

function buildSidebar(activeId) {
  var entities = getEntitiesLocal();
  var curId = getCurrentEntityId();
  var curEnt = entities.find(function(e){return e.id===curId;}) || entities[0] || {sigla:'—',nif:''};
  var html = '<div class="sidebar">'
    +'<div class="sb-logo"><div class="sb-logo-icon">Σ</div>'
    +'<div class="sb-logo-name">ESNL Contabilidade</div>'
    +'<div class="sb-logo-sub">Gestão para associações</div></div>'
    +'<div class="sb-entity" onclick="openEntitySwitcher()">'
    +'<div style="display:flex;align-items:center;justify-content:space-between">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<span class="sb-entity-dot"></span>'
    +'<span class="sb-entity-name">'+(curEnt.sigla||curEnt.nome||'—')+'</span></div>'
    +'<span style="font-size:10px;color:var(--silver)">▾</span></div>'
    +'<div class="sb-entity-sub">NIF '+(curEnt.nif||'—')+'</div></div>'
    +'<nav class="sb-nav">';
  _SECS.forEach(function(sec){
    html+='<div class="sb-section-label">'+sec.label+'</div>';
    sec.ids.forEach(function(id){
      var m=_NAV.find(function(x){return x.id===id;});
      if(!m) return;
      html+='<a href="'+m.href+'" class="nav-item'+(id===activeId?' active':'')+'">'
        +'<span class="nav-icon">'+m.icon+'</span>'
        +'<span class="nav-label">'+m.label+'</span></a>';
    });
  });
  html+='</nav>'
    +'<div class="sb-footer">'
    +'<button onclick="logout()" style="background:transparent;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:6px 12px;font-size:11px;color:var(--silver);cursor:pointer;width:100%;font-family:Outfit,sans-serif;transition:all .2s" onmouseover="this.style.borderColor=\'var(--red)\';this.style.color=\'var(--red)\'" onmouseout="this.style.borderColor=\'rgba(255,255,255,.08)\';this.style.color=\'var(--silver)\'">Terminar sessão</button>'
    +'<div class="sb-footer-copy" style="margin-top:8px">© Rui Gonçalves · SNC-ESNL</div>'
    +'</div></div>';
  return html;
}

function openEntitySwitcher() {
  if(document.getElementById('_es_ov')) return;
  var entities=getEntitiesLocal();
  var cur=getCurrentEntityId();
  var html='<div id="_es_ov" onclick="if(event.target===this)closeEntitySwitcher()" style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-start;justify-content:flex-start;padding:70px 0 0 14px">'
    +'<div style="background:#111d35;border:1px solid rgba(200,148,58,.18);border-radius:12px;width:320px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6)">'
    +'<div style="padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.06);font-family:Cormorant Garamond,serif;font-size:16px;font-weight:600;color:#e8edf5">Selecionar entidade</div>';
  entities.forEach(function(e){
    var sel=e.id===cur;
    html+='<div onclick="switchEntity(\''+e.id+'\')" style="padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;background:'+(sel?'rgba(200,148,58,.08)':'transparent')+';border-left:'+(sel?'2px solid #c8943a':'2px solid transparent')+'">'
      +'<div style="width:34px;height:34px;border-radius:8px;background:#1a2a45;border:1px solid rgba(200,148,58,.2);display:flex;align-items:center;justify-content:center;font-family:Cormorant Garamond,serif;font-size:13px;font-weight:600;color:#e0a84a;flex-shrink:0">'+(e.sigla||e.nome.substring(0,2).toUpperCase())+'</div>'
      +'<div><div style="font-size:13px;font-weight:500;color:#e8edf5">'+e.nome+'</div><div style="font-size:11px;color:#8a9ab5;margin-top:2px">NIF '+(e.nif||'—')+'</div></div></div>';
  });
  html+='<div onclick="location.href=\'entidades.html\'" style="padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:11px">'
    +'<div style="width:34px;height:34px;border-radius:8px;background:rgba(200,148,58,.1);border:1px solid rgba(200,148,58,.3);display:flex;align-items:center;justify-content:center;font-size:18px;color:#e0a84a">+</div>'
    +'<div style="font-size:13px;font-weight:500;color:#e0a84a">Nova associação</div></div>'
    +'</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}

function closeEntitySwitcher(){var el=document.getElementById('_es_ov');if(el)el.remove();}

function switchEntity(id){
  setCurrentEntityId(id);
  closeEntitySwitcher();
  location.reload();
}

const SETOR_CONTA_MAP = {
  'Comunicações':                 '6262',
  'Electricidade':                '6241',
  'Água':                         '6243',
  'Combustíveis e outros produtos petrolíferos': '6242',
  'Alojamento':                   '6251',
  'Saúde':                        '636',
  'Educação':                     '6268',
  'Seguros':                      '6263',
  'Restauração e similares':      '6268',
  'Rendas':                       '6261',
  'Serviços de construção civil': '6226',
  'Serviços de informática':      '6221',

  'Aquisição de passes mensais ou de bilhetes para utilização de transportes públicos coletivos': '6252',
  'Outros':                       '6268',
};

function getContaByCode(code) {
  return PLANO_CONTAS.find(c => c.c === code);
}

function _semAcentos(s){
  return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}
function searchContas(query) {
  const q = _semAcentos(query.toLowerCase().trim());
  if (!q) return [];
  return PLANO_CONTAS.filter(c =>
    c.c.startsWith(q) || _semAcentos(c.n.toLowerCase()).includes(q)
  ).slice(0, 40);
}
</script>
<script>
if(!requireAuth()) {}
document.getElementById('sidebar-wrap').innerHTML = buildSidebar('diario');
document.getElementById('f-data').value = hojeISO();
// Filtro de mês começa vazio (sem filtro) para mostrar TODOS os lançamentos do ano selecionado.
// Anteriormente ficava fixo no mês real atual, o que escondia lançamentos de anos/meses anteriores.
document.getElementById('f-mes').value = '';

var debC=null, crdC=null, curEnt=getCurrentEntityId(), allLancs=[], nextNum=1;

// Recorda o último ano selecionado no Diário (por entidade), para não voltar sempre a 2025
function getSavedAno(entId){
  return localStorage.getItem('esnl_diario_ano_'+entId) || document.getElementById('sel-ano').value;
}
function saveAno(entId,ano){
  localStorage.setItem('esnl_diario_ano_'+entId, ano);
}

onFirebaseReady(function(){
  loadEntities(function(arr){
    var sel=document.getElementById('sel-ent');
    arr.forEach(function(e){
      var o=document.createElement('option');
      o.value=e.id; o.textContent=e.nome;
      if(e.id===curEnt) o.selected=true;
      sel.appendChild(o);
    });
    if(!curEnt && arr.length){ curEnt=arr[0].id; setCurrentEntityId(curEnt); }
    // Restaura o ano guardado para esta entidade (se existir)
    var savedAno=getSavedAno(curEnt);
    var selAno=document.getElementById('sel-ano');
    if(savedAno) selAno.value=savedAno;
    reloadJournal();
  });
});

function onEntChange(id){
  curEnt=id; setCurrentEntityId(id);
  var savedAno=getSavedAno(curEnt);
  if(savedAno) document.getElementById('sel-ano').value=savedAno;
  reloadJournal();
}

function reloadJournal(){
  var ano=document.getElementById('sel-ano').value;
  saveAno(curEnt,ano);
  document.getElementById('jcont').innerHTML='<div style="padding:30px;text-align:center;color:var(--silver)"><span class="spin"></span>A carregar...</div>';
  loadDiario(curEnt,ano,function(lancs){
    allLancs=lancs;
    nextNum=lancs.length>0?Math.max.apply(null,lancs.map(function(l){return l.num||0;}))+1:1;
    renderJournal();
    updateSaldos();
  });
}

function doSearch(side,q){
  var drop=document.getElementById(side+'-d');
  if(!q.trim()){drop.style.display='none';return;}
  var res=searchContas(q);
  if(!res.length){drop.style.display='none';return;}
  var html='',lastG='';
  res.forEach(function(c){
    if(c.g!==lastG){html+='<div class="cgh">'+c.g+'</div>';lastG=c.g;}
    html+='<div class="cdi" onmousedown="selC(\''+side+'\',\''+c.c+'\',\''+c.n.replace(/'/g,"&#39;")+'\',\''+c.t+'\')">'
      +'<span class="cdc">'+c.c+'</span><span class="cdn">'+c.n+'</span>'
      +'<span class="cdt '+c.t+'">'+c.t+'</span></div>';
  });
  drop.innerHTML=html; drop.style.display='block';
}
function pickOnEnter(ev,side){
  if(ev.key!=='Enter') return;
  ev.preventDefault();
  var q=document.getElementById(side+'-s').value;
  var res=searchContas(q);
  if(res.length){
    var c=res[0];
    selC(side,c.c,c.n,c.t);
  }
}
function openCD(s){doSearch(s,document.getElementById(s+'-s').value);}
function closeCD(s){setTimeout(function(){document.getElementById(s+'-d').style.display='none';},200);}

function selC(side,code,name,type){
  if(side==='deb') debC={c:code,n:name,t:type};
  else crdC={c:code,n:name,t:type};
  document.getElementById(side+'-s').value=code+' — '+name;
  document.getElementById(side+'-d').style.display='none';
  var other=side==='deb'?'crd':'deb';
  var ov=parseFloat(document.getElementById(other+'-v').value)||0;
  var tv=parseFloat(document.getElementById(side+'-v').value)||0;
  if(ov&&!tv) document.getElementById(side+'-v').value=ov.toFixed(2);
  updBal();
}

function setCP(code,name,type){
  var side=debC?'crd':'deb';
  if(side==='deb') debC={c:code,n:name,t:type};
  else crdC={c:code,n:name,t:type};
  document.getElementById(side+'-s').value=code+' — '+name;
  var dv=parseFloat(document.getElementById('deb-v').value)||0;
  var cv=parseFloat(document.getElementById('crd-v').value)||0;
  if(dv&&!cv) document.getElementById('crd-v').value=dv.toFixed(2);
  if(cv&&!dv) document.getElementById('deb-v').value=cv.toFixed(2);
  updBal();
}

function updBal(){
  var dv=parseFloat(document.getElementById('deb-v').value)||0;
  var cv=parseFloat(document.getElementById('crd-v').value)||0;
  var diff=Math.abs(dv-cv);
  var bar=document.getElementById('bbar');
  var btn=document.getElementById('btn-grav');
  if(dv===0&&cv===0){bar.className='bbar bb-z';document.getElementById('btxt').textContent='Débito = Crédito';document.getElementById('bval').textContent='0,00 €';btn.disabled=true;}
  else if(diff<0.005){bar.className='bbar bb-ok';document.getElementById('btxt').textContent='✓ Equilibrado';document.getElementById('bval').textContent=fmt(dv)+' €';btn.disabled=!(debC&&crdC&&document.getElementById('f-desc').value.trim());}
  else{bar.className='bbar bb-nok';document.getElementById('btxt').textContent='Diferença';document.getElementById('bval').textContent=fmt(diff)+' €';btn.disabled=true;}
}

function gravar(){
  var btn=document.getElementById('btn-grav');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>A gravar...';
  var ano=document.getElementById('sel-ano').value;
  var lanc={num:nextNum,data:document.getElementById('f-data').value,
    desc:document.getElementById('f-desc').value.trim(),
    doc:document.getElementById('f-doc').value.trim(),
    movimentos:[
      {dc:'D',conta:debC.c,nome:debC.n,tipo:debC.t,valor:parseFloat(document.getElementById('deb-v').value)},
      {dc:'C',conta:crdC.c,nome:crdC.n,tipo:crdC.t,valor:parseFloat(document.getElementById('crd-v').value)}
    ]};
  saveLancamento(curEnt,ano,lanc,function(err){
    btn.disabled=false; btn.innerHTML='Gravar lançamento';
    if(!err){
      showToast('✓ Lançamento n.º '+lanc.num+' gravado');
      limpar(); reloadJournal();
    } else { showToast('Erro: '+err,'error'); btn.disabled=false; }
  });
}

function limpar(){
  ['f-desc','f-doc','deb-s','crd-s','deb-v','crd-v'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  debC=null;crdC=null;updBal();
}

function renderJournal(){
  var mes=document.getElementById('f-mes').value;
  var q=(document.getElementById('f-q').value||'').toLowerCase();
  var d=allLancs.filter(function(l){
    if(mes&&!(l.data||'').startsWith(mes)) return false;
    if(q){var h=((l.desc||'')+(l.doc||'')+(l.movimentos||[]).map(function(m){return m.conta+m.nome;}).join('')).toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  var cont=document.getElementById('jcont');
  if(!d.length){cont.innerHTML='<div style="text-align:center;padding:50px;color:var(--silver)"><div style="font-size:32px;opacity:.25;margin-bottom:10px">📒</div><div style="font-family:Cormorant Garamond,serif;font-size:18px;color:var(--text2)">Diário vazio</div></div>';
    document.getElementById('pd').textContent='D 0,00';document.getElementById('pc').textContent='C 0,00';return;}
  var tD=0,tC=0,html='';
  d.forEach(function(l){
    (l.movimentos||[]).forEach(function(m){if(m.dc==='D')tD+=m.valor;else tC+=m.valor;});
    html+='<div class="lg">'
      +'<div class="lhdr"><span class="lnum">Lº '+String(l.num||0).padStart(4,'0')+'</span>'
      +'<span class="ldesc">'+(l.desc||'')+'</span>'
      +'<span class="ldate">'+fmtDate(l.data)+'</span></div>'
      +(l.doc?'<div class="ldoc">Doc: '+l.doc+'</div>':'')
      +(l.movimentos||[]).map(function(m){
        return '<div class="ml">'
          +'<span class="mdc '+m.dc+'">'+m.dc+'</span>'
          +'<span><span class="mco">'+m.conta+'</span><span class="mnm">'+m.nome+'</span></span>'
          +'<span class="mv '+(m.dc==='D'?'D':'')+'" style="grid-column:3">'+(m.dc==='D'?fmt(m.valor):'')+'</span>'
          +'<span class="mv '+(m.dc==='C'?'C':'')+'" style="grid-column:4">'+(m.dc==='C'?fmt(m.valor):'')+'</span>'
          +'</div>';
      }).join('')
      +'<div class="lact"><button class="btd" onclick="delLanc(\''+l.fbKey+'\')">Eliminar</button></div>'
      +'</div>';
  });
  cont.innerHTML=html;
  document.getElementById('pd').textContent='D '+fmt(tD);
  document.getElementById('pc').textContent='C '+fmt(tC);
}

function filterJournal(){renderJournal();}

function delLanc(fbKey){
  if(!confirm('Eliminar este lançamento?')) return;
  var ano=document.getElementById('sel-ano').value;
  deleteLancamento(curEnt,ano,fbKey,function(err){
    if(!err){showToast('Lançamento eliminado');reloadJournal();}
    else showToast('Erro: '+err,'error');
  });
}

function updateSaldos(){
  var res=calcResultadoFromLancs(allLancs);
  function set(id,v,cls){var el=document.getElementById(id);if(el){el.textContent=fmt(v)+' €';el.className='sfv '+cls;}}
  set('sc',res.caixa,'val-pos');
  set('sb',res.banco,'val-pos');
  set('sg',res.gasto,'val-neg');
  set('sr',res.rend,'val-pos');
  set('sres',res.resultado,res.resultado>=0?'val-pos':'val-neg');
}
</script>
</body>
</html>
