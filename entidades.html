<style>
.layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 61px);overflow:hidden}
.esb{background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.esb-hdr{padding:14px 14px 10px;border-bottom:1px solid rgba(200,148,58,.1)}
.sw{position:relative}
.sw input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px 12px 8px 30px;font-size:13px;color:var(--text);font-family:Outfit,sans-serif;outline:none}
.sw input:focus{border-color:var(--gold)}
.sw::before{content:'⌕';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--silver);font-size:14px;pointer-events:none}
.elist{flex:1;padding:6px;overflow-y:auto}
.elist::-webkit-scrollbar{width:3px}
.elist::-webkit-scrollbar-thumb{background:rgba(200,148,58,.2)}
.ecard{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all .2s}
.ecard:hover{background:var(--surface);border-color:rgba(200,148,58,.1)}
.ecard.active{background:var(--surface2);border-color:var(--gold)}
.eavatar{width:38px;height:38px;border-radius:8px;background:var(--navy3);border:1px solid rgba(200,148,58,.2);display:flex;align-items:center;justify-content:center;font-family:Cormorant Garamond,serif;font-size:14px;font-weight:600;color:var(--gold2);flex-shrink:0;overflow:hidden}
.eavatar img{width:100%;height:100%;object-fit:contain;padding:3px}
.einfo{flex:1;min-width:0}
.ename{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.enif{font-size:10px;color:var(--silver);margin-top:2px}
.estatus{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.estatus.on{background:var(--green)} .estatus.off{background:var(--silver)}
.esb-ft{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.btn-ne{width:100%;background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:9px;font-family:Outfit,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-ne:hover{background:var(--gold2)}
.darea{overflow-y:auto;background:var(--bg);flex:1}
.darea::-webkit-scrollbar{width:3px}
.dinner{padding:24px;max-width:800px}
.dtabs{display:flex;gap:3px;background:var(--surface);border-radius:8px;padding:3px;width:fit-content;margin-bottom:20px}
.dtab{padding:6px 16px;border-radius:5px;font-size:12px;cursor:pointer;border:none;background:none;font-family:Outfit,sans-serif;color:var(--text2);transition:all .2s}

.fsec{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:20px;margin-bottom:14px}
.fshdr{display:flex;align-items:center;gap:9px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border2)}
.fsico{width:28px;height:28px;background:rgba(200,148,58,.1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
.fstit{font-family:Cormorant Garamond,serif;font-size:16px;font-weight:600;color:var(--text)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sp2{grid-column:span 2}
.logowrap{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.logoprev{width:64px;height:64px;border-radius:10px;background:var(--navy3);border:2px dashed rgba(200,148,58,.25);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;transition:border .2s;flex-shrink:0}
.logoprev:hover{border-color:var(--gold)}
.lph{font-size:10px;color:var(--silver);text-align:center;padding:6px;line-height:1.4}
.orgrow{display:grid;grid-template-columns:170px 1fr 34px;gap:8px;align-items:center;margin-bottom:7px}
.btico{width:34px;height:34px;border-radius:6px;background:transparent;border:1px solid var(--border2);color:var(--silver);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.btico:hover{border-color:var(--red);color:var(--red)}
.abar{padding:14px 24px;background:var(--navy2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;bottom:0}
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.mov.show{display:flex}
.movc{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:26px;width:400px;max-width:90vw}
.movc h3{font-family:Cormorant Garamond,serif;font-size:18px;margin-bottom:8px;color:var(--text)}
.movc p{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.movbt{display:flex;gap:8px;justify-content:flex-end}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(200,148,58,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

<div class="app-layout">
  <div id="sidebar-wrap"></div>
  <div class="app-main">
    <div class="topbar">
      <span class="topbar-title">Gestão de entidades</span>
      <div class="topbar-right">
        <span id="ent-count" style="background:rgba(200,148,58,.12);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--gold2)">A carregar...</span>
      </div>
    </div>
    <div class="layout">
      <div class="esb">
        <div class="esb-hdr">
          <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--silver);margin-bottom:10px">Associações</div>

    <div class="movbt">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-danger" onclick="confirmArchive()">Arquivar</button>
    </div>
  </div>
</div>

<script>
// ── ESNL Contabilidade v2 · Firebase Core ─────────────────────────────────
// © Rui Gonçalves · SNC-ESNL


const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBBHAI-u6nuAcn2KWgoZwsavyXZY6o4JhA",
  authDomain: "esnl-contabilidade.firebaseapp.com",
  databaseURL: "https://esnl-contabilidade-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "esnl-contabilidade",

};

const ADMIN_HASH = "21e0969c3460872a571aaa26f3873ebdc315c8e9d30668f39a47579c67c2b338";

// Firebase SDK (v9 compat)
let _db = null;
let _fbReady = false;
let _fbCallbacks = [];

function onFirebaseReady(cb) {
  if (_fbReady) { cb(); } else { _fbCallbacks.push(cb); }
}

function initFirebase() {
  if (typeof firebase === 'undefined') { setTimeout(initFirebase, 100); return; }
  if (_db) return;
  try {
    const app = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(FIREBASE_CONFIG);
    _db = firebase.database(app);
    _fbReady = true;
    _fbCallbacks.forEach(function(cb){ cb(); });
    _fbCallbacks = [];
  } catch(e) { console.error('Firebase init error:', e); }
}

// ── AUTH ───────────────────────────────────────────────────────────────────
function isLoggedIn() {
  return sessionStorage.getItem('esnl_auth') === '1';
}

function login(password, cb) {
  // SHA-256 da password
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(password))
    .then(function(buf) {
      var hash = Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
      if (hash === ADMIN_HASH) {
        sessionStorage.setItem('esnl_auth', '1');
        cb(true);
      } else {
        cb(false);
      }
    });
}

function logout() {
  sessionStorage.removeItem('esnl_auth');
  location.href = 'index.html';
}

function requireAuth() {
  if (!isLoggedIn()) { location.href = 'index.html'; return false; }
  return true;
}

// ── DATABASE ───────────────────────────────────────────────────────────────
function dbRef(path) {
  return _db ? _db.ref(path) : null;
}

function dbGet(path, cb) {
  onFirebaseReady(function() {
    _db.ref(path).once('value', function(snap) { cb(snap.val()); });
  });
}

function dbSet(path, data, cb) {
  onFirebaseReady(function() {
    _db.ref(path).set(data, function(err) { if(cb) cb(err); });
  });
}

function dbUpdate(path, data, cb) {
  onFirebaseReady(function() {
    _db.ref(path).update(data, function(err) { if(cb) cb(err); });
  });
}

function dbRemove(path, cb) {
  onFirebaseReady(function() {
    _db.ref(path).remove(function(err) { if(cb) cb(err); });
  });
}

function dbPush(path, data, cb) {
  onFirebaseReady(function() {
    var ref = _db.ref(path).push(data, function(err) { if(cb) cb(err, ref.key); });
  });
}

// ── ENTIDADES ──────────────────────────────────────────────────────────────
function getEntitiesLocal() {
  try { return JSON.parse(localStorage.getItem('esnl_entities_cache') || '[]'); }
  catch(e) { return []; }
}

function loadEntities(cb) {
  dbGet('entidades', function(data) {
    var arr = data ? Object.keys(data).map(function(k){ var e=data[k]; e.id=k; return e; }) : [];
    arr.sort(function(a,b){ return (a.nome||'').localeCompare(b.nome||''); });
    localStorage.setItem('esnl_entities_cache', JSON.stringify(arr));
    cb(arr);
  });
}

function saveEntity(entity, cb) {
  var id = entity.id || _db.ref('entidades').push().key;
  entity.id = id;
  dbSet('entidades/' + id, entity, function(err) {
    if (!err) {
      var arr = getEntitiesLocal();
      var idx = arr.findIndex(function(e){ return e.id===id; });
      if (idx>=0) arr[idx]=entity; else arr.push(entity);
      localStorage.setItem('esnl_entities_cache', JSON.stringify(arr));
    }
    if(cb) cb(err, id);
  });
}

function getCurrentEntityId() {
  return localStorage.getItem('esnl_current_entity') || '';
}

function setCurrentEntityId(id) {
  localStorage.setItem('esnl_current_entity', id);
}

// ── DIÁRIO ─────────────────────────────────────────────────────────────────
function loadDiario(entityId, ano, cb) {
  dbGet('diario/' + entityId + '/' + ano, function(data) {
    var arr = data ? Object.keys(data).map(function(k){ var l=data[k]; l.fbKey=k; return l; }) : [];
    arr.sort(function(a,b){ return (b.data||'').localeCompare(a.data||''); });
    cb(arr);
  });
}

function saveLancamento(entityId, ano, lanc, cb) {
  var path = 'diario/' + entityId + '/' + ano;
  if (lanc.fbKey) {
    dbSet(path + '/' + lanc.fbKey, lanc, cb);
  } else {
    dbPush(path, lanc, cb);
  }
}

function deleteLancamento(entityId, ano, fbKey, cb) {
  dbRemove('diario/' + entityId + '/' + ano + '/' + fbKey, cb);
}

// ── CÁLCULOS ───────────────────────────────────────────────────────────────
function calcResultadoFromLancs(lancs) {
  var rend=0, gasto=0, caixa=0, banco=0;
  lancs.forEach(function(l) {
    (l.movimentos||[]).forEach(function(m) {
      var v = m.dc==='D' ? m.valor : -m.valor;
      if (m.conta && m.conta.startsWith('11')) caixa += v;
      if (m.conta && (m.conta.startsWith('12')||m.conta.startsWith('13'))) banco += v;
      if (m.dc==='D' && m.tipo==='gasto') gasto += m.valor;
      if (m.dc==='C' && m.tipo==='rendimento') rend += m.valor;
    });
  });
  return { rend:rend, gasto:gasto, resultado:rend-gasto, caixa:Math.max(caixa,0), banco:Math.max(banco,0) };
}

// ── FORMATAÇÃO ─────────────────────────────────────────────────────────────
function fmt(v) {
  return parseFloat(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(d) {
  if(!d) return '';
  var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}
function hojeISO() {
  return new Date().toISOString().split('T')[0];
}
function hoje() {
  return new Date().toLocaleDateString('pt-PT',{day:'numeric',month:'long',year:'numeric'});
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  var t=document.getElementById('_toast');
  if(!t){
    t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:20px;right:20px;background:#1a2a45;border:1px solid #c8943a;border-radius:8px;padding:10px 16px;font-size:13px;color:#e8edf5;box-shadow:0 8px 24px rgba(0,0,0,.5);transform:translateY(20px);opacity:0;transition:all .3s;z-index:9999;pointer-events:none;font-family:Outfit,sans-serif;max-width:320px';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.borderColor=type==='error'?'#e05050':'#c8943a';
  t.style.opacity='1';t.style.transform='translateY(0)';
  clearTimeout(t._tmr);
  t._tmr=setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(20px)';},2800);
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
var _NAV=[
  {id:'dashboard', href:'dashboard.html', icon:'⊞',  label:'Dashboard'},
  {id:'entidades', href:'entidades.html', icon:'🏛️', label:'Entidades'},
  {id:'diario',    href:'diario.html',    icon:'📒',  label:'Diário'},
  {id:'efatura',   href:'efatura.html',   icon:'📥',  label:'Importar eFatura'},
  {id:'balancetes',href:'balancetes.html',icon:'📊',  label:'Balancetes'},
  {id:'balanco',   href:'balanco.html',   icon:'⚖️',  label:'Balanço · DRN'},
  {id:'documentos',href:'documentos.html',icon:'📄',  label:'Documentos'},
];
var _SECS=[
  {label:'Principal',     ids:['dashboard']},
  {label:'Contabilidade', ids:['entidades','diario','efatura']},
  {label:'Relatórios',    ids:['balancetes','balanco']},
  {label:'Documentos',    ids:['documentos']},
];

function buildSidebar(activeId) {
  var entities = getEntitiesLocal();
  var curId = getCurrentEntityId();
  var curEnt = entities.find(function(e){return e.id===curId;}) || entities[0] || {sigla:'—',nif:''};
  var html = '<div class="sidebar">'
    +'<div class="sb-logo"><div class="sb-logo-icon">Σ</div>'
    +'<div class="sb-logo-name">ESNL Contabilidade</div>'
    +'<div class="sb-logo-sub">Gestão para associações</div></div>'
    +'<div class="sb-entity" onclick="openEntitySwitcher()">'
    +'<div style="display:flex;align-items:center;justify-content:space-between">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<span class="sb-entity-dot"></span>'
    +'<span class="sb-entity-name">'+(curEnt.sigla||curEnt.nome||'—')+'</span></div>'
    +'<span style="font-size:10px;color:var(--silver)">▾</span></div>'
    +'<div class="sb-entity-sub">NIF '+(curEnt.nif||'—')+'</div></div>'
    +'<nav class="sb-nav">';
  _SECS.forEach(function(sec){
    html+='<div class="sb-section-label">'+sec.label+'</div>';
    sec.ids.forEach(function(id){
      var m=_NAV.find(function(x){return x.id===id;});
      if(!m) return;
      html+='<a href="'+m.href+'" class="nav-item'+(id===activeId?' active':'')+'">'
        +'<span class="nav-icon">'+m.icon+'</span>'
        +'<span class="nav-label">'+m.label+'</span></a>';
    });
  });
  html+='</nav>'
    +'<div class="sb-footer">'
    +'<button onclick="logout()" style="background:transparent;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:6px 12px;font-size:11px;color:var(--silver);cursor:pointer;width:100%;font-family:Outfit,sans-serif;transition:all .2s" onmouseover="this.style.borderColor=\'var(--red)\';this.style.color=\'var(--red)\'" onmouseout="this.style.borderColor=\'rgba(255,255,255,.08)\';this.style.color=\'var(--silver)\'">Terminar sessão</button>'
    +'<div class="sb-footer-copy" style="margin-top:8px">© Rui Gonçalves · SNC-ESNL</div>'
    +'</div></div>';
  return html;
}

function openEntitySwitcher() {
  if(document.getElementById('_es_ov')) return;
  var entities=getEntitiesLocal();
  var cur=getCurrentEntityId();
  var html='<div id="_es_ov" onclick="if(event.target===this)closeEntitySwitcher()" style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-start;justify-content:flex-start;padding:70px 0 0 14px">'
    +'<div style="background:#111d35;border:1px solid rgba(200,148,58,.18);border-radius:12px;width:320px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6)">'
    +'<div style="padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.06);font-family:Cormorant Garamond,serif;font-size:16px;font-weight:600;color:#e8edf5">Selecionar entidade</div>';
  entities.forEach(function(e){
    var sel=e.id===cur;
    html+='<div onclick="switchEntity(\''+e.id+'\')" style="padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;background:'+(sel?'rgba(200,148,58,.08)':'transparent')+';border-left:'+(sel?'2px solid #c8943a':'2px solid transparent')+'">'
      +'<div style="width:34px;height:34px;border-radius:8px;background:#1a2a45;border:1px solid rgba(200,148,58,.2);display:flex;align-items:center;justify-content:center;font-family:Cormorant Garamond,serif;font-size:13px;font-weight:600;color:#e0a84a;flex-shrink:0">'+(e.sigla||e.nome.substring(0,2).toUpperCase())+'</div>'
      +'<div><div style="font-size:13px;font-weight:500;color:#e8edf5">'+e.nome+'</div><div style="font-size:11px;color:#8a9ab5;margin-top:2px">NIF '+(e.nif||'—')+'</div></div></div>';
  });
  html+='<div onclick="location.href=\'entidades.html\'" style="padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:11px">'
    +'<div style="width:34px;height:34px;border-radius:8px;background:rgba(200,148,58,.1);border:1px solid rgba(200,148,58,.3);display:flex;align-items:center;justify-content:center;font-size:18px;color:#e0a84a">+</div>'
    +'<div style="font-size:13px;font-weight:500;color:#e0a84a">Nova associação</div></div>'
    +'</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}

function closeEntitySwitcher(){var el=document.getElementById('_es_ov');if(el)el.remove();}

function switchEntity(id){
  setCurrentEntityId(id);
  closeEntitySwitcher();
  location.reload();
}

(function(){
  if(document.getElementById('_esnl_css')) return;

  s.id='_esnl_css';
  s.textContent='@import url(\'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap\');'

function renderList(filter) {
  var f=(filter||'').toLowerCase();
  var ents=allEntities.filter(function(e){return !f||(e.nome.toLowerCase().includes(f)||(e.nif||'').includes(f));});
  var list=document.getElementById('entity-list');
  if(!ents.length){list.innerHTML='<div style="padding:20px;text-align:center;font-size:12px;color:var(--silver)">Sem resultados</div>';return;}
  list.innerHTML=ents.map(function(e){
    var av=e.logo?'<img src="'+e.logo+'">'
      :'<span style="font-family:Cormorant Garamond,serif;font-size:14px;font-weight:600;color:var(--gold2)">'+(e.sigla||initials(e.nome))+'</span>';
    return '<div class="ecard'+(e.id===currentId?' active':'')+'" onclick="selectEntity(\''+e.id+'\')">'
      +'<div class="eavatar">'+av+'</div>'
      +'<div class="einfo"><div class="ename">'+e.nome+'</div><div class="enif">NIF '+(e.nif||'—')+' · '+e.tipo+'</div></div>'
      +'<div class="estatus '+(e.ativa?'on':'off')+'"></div>'
      +'</div>';
  }).join('');
}

function filterList(v){renderList(v);}

function selectEntity(id){
  currentId=id;
  renderList(document.getElementById('search-input').value);
  var e=allEntities.find(function(x){return x.id===id;});
  if(e) renderDetail(e);
}

function renderDetail(e) {
  var sbg=e.ativa?'rgba(74,184,122,.12)':'rgba(138,154,181,.12)';
  var sc=e.ativa?'var(--green)':'var(--silver)';
  var sbd=e.ativa?'rgba(74,184,122,.25)':'rgba(138,154,181,.2)';
  var logoHtml=e.logo?'<img src="'+e.logo+'" style="width:100%;height:100%;object-fit:contain;padding:5px">':'<div class="lph">Carregar<br>logo</div>';
  var removeBtn=e.logo?'<button class="btn-secondary" style="font-size:12px;padding:6px 12px" onclick="removeLogo(\''+e.id+'\')">Remover</button>':'';

  document.getElementById('detail-area').innerHTML =
    '<div class="dinner">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px">'

    +'<div style="font-size:12px;color:var(--silver)">'+e.tipo+' · NIF '+(e.nif||'—')+' · '+(e.distrito||'—')+'</div></div>'
    +'<span style="padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;background:'+sbg+';color:'+sc+';border:1px solid '+sbd+'">'+(e.ativa?'Ativa':'Arquivada')+'</span>'
    +'</div>'
    +'<div class="dtabs">'
    +'<button class="dtab active" onclick="switchTab(this,\'tdados\')">Dados gerais</button>'
    +'<button class="dtab" onclick="switchTab(this,\'torgaos\')">Órgãos sociais</button>'
    +'<button class="dtab" onclick="switchTab(this,\'tconfig\')">Configurações</button>'
    +'</div>'
    // TAB DADOS
    +'<div id="tdados">'
    +'<div class="fsec"><div class="fshdr"><div class="fsico">🏛️</div><div class="fstit">Identidade</div></div>'
    +'<div class="logowrap">'
    +'<div class="logoprev" onclick="uploadLogo(\''+e.id+'\')">'+logoHtml+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px">'
    +'<button class="btn-secondary" style="font-size:12px;padding:6px 12px" onclick="uploadLogo(\''+e.id+'\')">Carregar imagem</button>'+removeBtn+'</div>'
    +'<input type="file" id="lf-'+e.id+'" accept="image/*" style="display:none" onchange="handleLogo(event,\''+e.id+'\')">'
    +'</div>'
    +'<div class="g2">'
    +'<div class="fgroup sp2"><label class="flabel">Denominação completa</label><input class="finput" id="f-nome" value="'+e.nome+'"></div>'
    +'<div class="fgroup"><label class="flabel">Sigla</label><input class="finput" id="f-sigla" value="'+(e.sigla||'')+'"></div>'
    +'<div class="fgroup"><label class="flabel">Tipo</label><select class="finput" id="f-tipo">'+tipoOpts(e.tipo)+'</select></div>'
    +'<div class="fgroup"><label class="flabel">NIF</label><input class="finput" id="f-nif" value="'+(e.nif||'')+'" maxlength="11"></div>'
    +'<div class="fgroup"><label class="flabel">Distrito</label><select class="finput" id="f-dist">'+distOpts(e.distrito)+'</select></div>'
    +'</div></div>'
    +'<div class="fsec"><div class="fshdr"><div class="fsico">📬</div><div class="fstit">Contactos e sede</div></div>'
    +'<div class="g2">'
    +'<div class="fgroup sp2"><label class="flabel">Sede / morada</label><input class="finput" id="f-sede" value="'+(e.sede||'')+'"></div>'
    +'<div class="fgroup"><label class="flabel">Email</label><input class="finput" id="f-email" value="'+(e.email||'')+'"></div>'
    +'<div class="fgroup"><label class="flabel">Telefone</label><input class="finput" id="f-tel" value="'+(e.tel||'')+'"></div>'
    +'<div class="fgroup sp2"><label class="flabel">Website</label><input class="finput" id="f-web" value="'+(e.website||'')+'"></div>'
    +'</div></div>'
    +'<div class="fsec"><div class="fshdr"><div class="fsico">📝</div><div class="fstit">Notas internas</div></div>'
    +'<textarea class="finput" id="f-notas" rows="3" style="resize:vertical">'+(e.notas||'')+'</textarea>'
    +'</div></div>'
    // TAB ORGAOS

    +'<div id="orgaos-list">'+renderOrgaos(e.orgaos||[])+'</div>'

    +'<div id="tconfig" style="display:none">'

    +'<div class="fgroup"><label class="flabel">Regime IVA</label><select class="finput"><option>Isento (art.º 9.º)</option><option>Normal mensal</option><option>Normal trimestral</option></select></div>'
    +'</div></div>'
    +'<div class="fsec"><div class="fshdr"><div class="fsico">🗃️</div><div class="fstit">Arquivo</div></div>'

    +'<button class="btn-danger" onclick="archiveEntity(\''+e.id+'\')">'+(e.ativa?'Arquivar associação':'Restaurar associação')+'</button>'
    +'</div></div>'
    +'<div class="abar">'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn-primary" id="btn-save" onclick="doSave(\''+e.id+'\')">Guardar alterações</button>'
    +'<button class="btn-secondary" onclick="selectEntity(\''+e.id+'\')">Cancelar</button>'
    +'</div>'
    +'<span style="font-size:11px;color:var(--silver)">Criada em '+(e.criada||'—')+'</span>'
    +'</div>'
    +'</div>';
}

function renderOrgaos(orgaos){
  if(!orgaos.length) return '<div style="font-size:13px;color:var(--silver);padding:4px 0">Nenhum membro adicionado.</div>';
  return orgaos.map(function(o,i){
    var opts=ORGAOS.map(function(r){return '<option'+(r===o.cargo?' selected':'')+'>'+r+'</option>';}).join('');
    return '<div class="orgrow" id="or-'+i+'">'
      +'<select class="finput" id="oc-'+i+'" style="font-size:12px">'+opts+'</select>'
      +'<input class="finput" id="on-'+i+'" value="'+(o.nome||'')+'" placeholder="Nome completo">'
      +'<button class="btico" onclick="removeOrgao('+i+')">✕</button>'
      +'</div>';
  }).join('');
}

function switchTab(btn,tabId){
  document.querySelectorAll('.dtab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  ['tdados','torgaos','tconfig'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.style.display=id===tabId?'block':'none';
  });
}

function doSave(id){
  var btn=document.getElementById('btn-save');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>A guardar...';}
  var e=allEntities.find(function(x){return x.id===id;});
  if(!e) e={id:id,criada:hojeISO()};
  e.nome=document.getElementById('f-nome').value||e.nome;
  e.sigla=document.getElementById('f-sigla').value;
  e.tipo=document.getElementById('f-tipo').value;
  e.nif=document.getElementById('f-nif').value;
  e.distrito=document.getElementById('f-dist').value;
  e.sede=document.getElementById('f-sede').value;
  e.email=document.getElementById('f-email').value;
  e.tel=document.getElementById('f-tel').value;
  e.website=document.getElementById('f-web').value;
  e.notas=document.getElementById('f-notas').value;
  var rows=document.querySelectorAll('[id^="or-"]');
  if(rows.length) e.orgaos=Array.from(rows).map(function(_,i){
    return {cargo:document.getElementById('oc-'+i).value||'',nome:document.getElementById('on-'+i).value||''};
  }).filter(function(o){return o.nome;});
  saveEntity(e,function(err){
    if(!err){
      var idx=allEntities.findIndex(function(x){return x.id===id;});
      if(idx>=0) allEntities[idx]=e; else allEntities.push(e);
      renderList(document.getElementById('search-input').value);
      document.getElementById('ent-count').textContent=allEntities.filter(function(x){return x.ativa;}).length+' entidades ativas';
      showToast('✓ Associação guardada no Firebase');
    } else {
      showToast('Erro ao guardar: '+err,'error');
    }
    if(btn){btn.disabled=false;btn.innerHTML='Guardar alterações';}
  });
}

function newEntity(){
  var nova={nome:'Nova associação',sigla:'',tipo:'Associação',nif:'',sede:'',distrito:'Braga',email:'',tel:'',website:'',logo:'',ativa:true,orgaos:[],notas:'',criada:hojeISO()};
  saveEntity(nova,function(err,newId){
    if(!err){
      nova.id=newId;
      allEntities.unshift(nova);
      renderList('');
      selectEntity(newId);
      setTimeout(function(){var el=document.getElementById('f-nome');if(el){el.select();el.focus();}},100);
    }
  });
}

function addOrgao(){
  var e=allEntities.find(function(x){return x.id===currentId;});
  if(!e) return;
  e.orgaos=e.orgaos||[];
  e.orgaos.push({cargo:'Vogal',nome:''});
  document.getElementById('orgaos-list').innerHTML=renderOrgaos(e.orgaos);
}

function removeOrgao(i){
  var e=allEntities.find(function(x){return x.id===currentId;});
  if(!e) return;
  e.orgaos.splice(i,1);
  document.getElementById('orgaos-list').innerHTML=renderOrgaos(e.orgaos);
}

function archiveEntity(id){
  var e=allEntities.find(function(x){return x.id===id;});
  if(!e) return;
  if(!e.ativa){e.ativa=true;saveEntity(e,function(){renderList('');renderDetail(e);showToast('✓ Restaurada');});return;}
  archiveTarget=id;
  document.getElementById('arch-modal').classList.add('show');
}
function confirmArchive(){
  var e=allEntities.find(function(x){return x.id===archiveTarget;});
  if(e){e.ativa=false;saveEntity(e,function(){renderList('');renderDetail(e);showToast('Associação arquivada');});}
  closeModal();
}
function closeModal(){document.getElementById('arch-modal').classList.remove('show');archiveTarget=null;}

function uploadLogo(id){var el=document.getElementById('lf-'+id);if(el)el.click();}
function handleLogo(event,id){
  var file=event.target.files[0];if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var e=allEntities.find(function(x){return x.id===id;});
    if(e){e.logo=ev.target.result;saveEntity(e,function(){renderList('');renderDetail(e);showToast('✓ Logo guardado');});}
  };
  reader.readAsDataURL(file);
}
function removeLogo(id){
  var e=allEntities.find(function(x){return x.id===id;});
  if(e){e.logo='';saveEntity(e,function(){renderList('');renderDetail(e);});}
}

onFirebaseReady(load);
</script>
